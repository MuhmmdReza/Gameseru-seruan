<!DOCTYPE html>
<html>
<head>
  <title>Mini ML Full</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; overflow:hidden; background:#000; }
    canvas { display:block; }

    .btn {
      position: fixed;
      bottom: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      color: white;
      text-align: center;
      line-height: 60px;
      font-weight: bold;
    }

    #atk { right: 20px; }
    #skill { right: 100px; }

    input {
      position: fixed;
      left: 10px;
      color: white;
    }

    #heroUpload { top: 10px; }
    #bgUpload { top: 50px; }
  </style>
</head>
<body>

<input type="file" id="heroUpload">
<input type="file" id="bgUpload">

<canvas id="game"></canvas>

<div id="atk" class="btn">A</div>
<div id="skill" class="btn">S</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// MAP SIZE (lebih besar dari layar)
const mapWidth = 2000;
const mapHeight = 1200;

// CAMERA
let camera = { x: 0, y: 0 };

// HERO
let hero = {
  x: 200,
  y: 200,
  size: 70,
  hp: 100,
  speed: 5,
  img: new Image(),
  loaded: false
};

hero.img.src = "https://via.placeholder.com/100";
hero.img.onload = () => hero.loaded = true;

// BACKGROUND
let bgImg = new Image();
let bgLoaded = false;

bgImg.onload = () => bgLoaded = true;

// UPLOAD HERO
document.getElementById("heroUpload").addEventListener("change", e => {
  let reader = new FileReader();
  reader.onload = ev => hero.img.src = ev.target.result;
  reader.readAsDataURL(e.target.files[0]);
});

// UPLOAD BG
document.getElementById("bgUpload").addEventListener("change", e => {
  let reader = new FileReader();
  reader.onload = ev => bgImg.src = ev.target.result;
  reader.readAsDataURL(e.target.files[0]);
});

// ENEMY
let enemy = {
  x: 800,
  y: 400,
  size: 70,
  hp: 100
};

// CONTROL
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// ATTACK
let canAttack = true;
function attack() {
  if (!canAttack) return;

  let dist = Math.hypot(hero.x - enemy.x, hero.y - enemy.y);
  if (dist < 100) enemy.hp -= 10;

  canAttack = false;
  setTimeout(() => canAttack = true, 400);
}

// SKILL
let canSkill = true;
function skill() {
  if (!canSkill) return;

  let dist = Math.hypot(hero.x - enemy.x, hero.y - enemy.y);
  if (dist < 180) enemy.hp -= 25;

  canSkill = false;
  setTimeout(() => canSkill = true, 1200);
}

document.getElementById("atk").onclick = attack;
document.getElementById("skill").onclick = skill;

// UPDATE
function update() {
  if (keys["w"]) hero.y -= hero.speed;
  if (keys["s"]) hero.y += hero.speed;
  if (keys["a"]) hero.x -= hero.speed;
  if (keys["d"]) hero.x += hero.speed;

  if (keys[" "]) attack();
  if (keys["e"]) skill();

  // BATAS MAP
  hero.x = Math.max(0, Math.min(mapWidth - hero.size, hero.x));
  hero.y = Math.max(0, Math.min(mapHeight - hero.size, hero.y));

  // MUSUH NGIKUT
  let dx = hero.x - enemy.x;
  let dy = hero.y - enemy.y;
  enemy.x += dx * 0.01;
  enemy.y += dy * 0.01;

  // CAMERA NGIKUT HERO
  camera.x = hero.x - canvas.width / 2;
  camera.y = hero.y - canvas.height / 2;

  camera.x = Math.max(0, Math.min(mapWidth - canvas.width, camera.x));
  camera.y = Math.max(0, Math.min(mapHeight - canvas.height, camera.y));
}

// DRAW
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // BACKGROUND MAP
  if (bgLoaded) {
    ctx.drawImage(bgImg, -camera.x, -camera.y, mapWidth, mapHeight);
  } else {
    ctx.fillStyle = "#222";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // HERO
  if (hero.loaded) {
    ctx.drawImage(hero.img, hero.x - camera.x, hero.y - camera.y, hero.size, hero.size);
  } else {
    ctx.fillStyle = "blue";
    ctx.fillRect(hero.x - camera.x, hero.y - camera.y, hero.size, hero.size);
  }

  // HP HERO
  ctx.fillStyle = "red";
  ctx.fillRect(hero.x - camera.x, hero.y - camera.y - 10, hero.hp, 5);

  // ENEMY
  ctx.fillStyle = "purple";
  ctx.fillRect(enemy.x - camera.x, enemy.y - camera.y, enemy.size, enemy.size);

  ctx.fillStyle = "red";
  ctx.fillRect(enemy.x - camera.x, enemy.y - camera.y - 10, enemy.hp, 5);

  // TEXT
  ctx.fillStyle = "white";
  ctx.fillText("WASD / Touch | SPACE = Attack | E = Skill", 20, 30);
}

// LOOP
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
