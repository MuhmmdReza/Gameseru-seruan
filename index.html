<!DOCTYPE html>
<html>
<head>
  <title>Mini ML Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; overflow:hidden; background:#111; }
    canvas { display:block; }

    /* tombol skill */
    .btn {
      position: fixed;
      bottom: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      color: white;
      text-align: center;
      line-height: 60px;
      font-weight: bold;
      user-select: none;
    }

    #atk { right: 20px; }
    #skill { right: 100px; }

    /* upload */
    #upload {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
    }
  </style>
</head>
<body>

<input type="file" id="upload">

<canvas id="game"></canvas>

<div id="atk" class="btn">A</div>
<div id="skill" class="btn">S</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hero = {
  x: 100,
  y: 200,
  size: 70,
  hp: 100,
  speed: 4,
  img: new Image()
};

// default pakai file lokal
hero.img.src = "hero.png";

let enemy = {
  x: 500,
  y: 200,
  size: 70,
  hp: 100
};

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

let canAttack = true;
let canSkill = true;

// upload foto dari galeri
document.getElementById("upload").addEventListener("change", function(e) {
  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(event) {
    hero.img.src = event.target.result;
  };

  reader.readAsDataURL(file);
});

function attack() {
  if (!canAttack) return;

  let dist = Math.hypot(hero.x - enemy.x, hero.y - enemy.y);
  if (dist < 100) enemy.hp -= 10;

  canAttack = false;
  setTimeout(() => canAttack = true, 500);
}

function skill() {
  if (!canSkill) return;

  let dist = Math.hypot(hero.x - enemy.x, hero.y - enemy.y);
  if (dist < 150) enemy.hp -= 25;

  canSkill = false;
  setTimeout(() => canSkill = true, 1500);
}

// tombol UI
document.getElementById("atk").onclick = attack;
document.getElementById("skill").onclick = skill;

function update() {
  // gerak keyboard
  if (keys["w"]) hero.y -= hero.speed;
  if (keys["s"]) hero.y += hero.speed;
  if (keys["a"]) hero.x -= hero.speed;
  if (keys["d"]) hero.x += hero.speed;

  // musuh ngejar
  let dx = hero.x - enemy.x;
  let dy = hero.y - enemy.y;
  enemy.x += dx * 0.01;
  enemy.y += dy * 0.01;

  // attack keyboard
  if (keys[" "]) attack();
  if (keys["e"]) skill();
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // hero (gambar wajah kamu)
  ctx.drawImage(hero.img, hero.x, hero.y, hero.size, hero.size);

  // HP hero
  ctx.fillStyle = "red";
  ctx.fillRect(hero.x, hero.y - 10, hero.hp, 6);

  // enemy
  ctx.fillStyle = "purple";
  ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

  // HP enemy
  ctx.fillStyle = "red";
  ctx.fillRect(enemy.x, enemy.y - 10, enemy.hp, 6);

  // teks
  ctx.fillStyle = "white";
  ctx.fillText("WASD = gerak | SPACE = attack | E = skill", 20, 20);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
